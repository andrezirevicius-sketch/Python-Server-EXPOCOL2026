<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loginPage</title>
    <link rel="stylesheet" href="/static/expocol.css">
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    <form action="/loginPage" method="POST">
        <p>coloque seu login</p>
        <p>email:<input type="email" name="email" required minlength="6"></p>
        <p>senha:<input type="password" name="password" required minlength="6"></p>

        <button type="submit">Login</button>
        <br>
        <br>
        <br>
    </form>
</body>
</html>
